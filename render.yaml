services:
  - type: web
    name: carbonwise-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: CarbonWise API
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: DATABASE_URL
        value: sqlite:///./carbonwise.db
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:5173","http://127.0.0.1:5173","https://sainadhpuvvada2005-ui.github.io"]'
